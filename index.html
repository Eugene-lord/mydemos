<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beauty Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #1a1a1d, #111);
  font-family: 'Inter', sans-serif;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  margin-bottom: 25px;
}

.card {
  background: #1f1f23;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #2a2a2e;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(45deg, #ff4d8d, #ff9a9e);
  font-size: 16px;
}

.slots {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.slot {
  padding: 10px 12px;
  border-radius: 10px;
  background: #2a2a2e;
  cursor: pointer;
}

.slot.booked {
  opacity: 0.3;
}

.slot.selected {
  background: #ff4d8d;
}
</style>
</head>

<body>

<div class="container">
  <h1>Beauty Studio</h1>

  <div class="card">
    <input id="name" placeholder="Ваше имя">

    <input id="phone" placeholder="+7 или 8">

    <select id="service">
      <option>Маникюр</option>
      <option>Стрижка</option>
      <option>Окрашивание</option>
    </select>

    <select id="master">
      <option>Анна</option>
      <option>Мария</option>
    </select>

    <input type="date" id="date">

    <div class="slots" id="slots"></div>

    <button onclick="submitForm()">Записаться</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwYCoL_LtT-jpDscMuc30yVzIOQGUNerpeidVBHVTVAMqZ7VWDp5FPz_2nW_HmnVF77bw/exec";

let selectedTime = null;
let booked = [];

function normalizePhone(phone) {
  let digits = phone.replace(/\D/g, "");

  if (digits.startsWith("8")) digits = "7" + digits.slice(1);
  if (digits.length === 10) digits = "7" + digits;

  return "+" + digits;
}

async function loadData() {
  const res = await fetch(API_URL);
  booked = await res.json();
}

function renderSlots() {
  const date = document.getElementById("date").value;
  const master = document.getElementById("master").value;

  const container = document.getElementById("slots");
  container.innerHTML = "";

  for (let h = 10; h <= 20; h++) {
    let time = h + ":00";

    let isBusy = booked.some(b =>
      b.date === date &&
      b.time === time &&
      b.master === master
    );

    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = time;

    if (isBusy) div.classList.add("booked");

    div.onclick = () => {
      if (isBusy) return;

      document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
      div.classList.add("selected");
      selectedTime = time;
    };

    container.appendChild(div);
  }
}

document.getElementById("date").onchange = renderSlots;
document.getElementById("master").onchange = renderSlots;

async function submitForm() {
  const name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  const service = document.getElementById("service").value;
  const master = document.getElementById("master").value;
  const date = document.getElementById("date").value;

  if (!name || !phone || !date || !selectedTime) {
    alert("Заполни всё");
    return;
  }

  phone = normalizePhone(phone);

 const res = await fetch(API_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    name,
    phone,
    service,
    master,
    date,
    time: selectedTime
  })
});

  const text = await res.text();

  if (text === "busy") {
    alert("Это время уже занято");
    return;
  }

  alert("Вы записаны 💅 ");
  location.reload();
}

loadData();
</script>

</body>
</html>
